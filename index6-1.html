<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Conveyor Smart UI</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f172a;
            font-family: system-ui,sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            overflow: auto;
        }

        svg {
            width: 100%;
            height: auto;
        }

        path {
            fill: none;
            stroke: #334155;
            stroke-width: 10;
            stroke-linejoin: round;
        }

        .flow {
            stroke: #38bdf8;
            stroke-width: 3;
            stroke-dasharray: 6 12;
            animation: flow 2s linear infinite;
        }

        @keyframes flow {
            to {
                stroke-dashoffset: -18;
            }
        }

        #stations {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
        }

        .station {
            position: absolute;
            width: 120px;
            height: 42px;
            background: #3b82f6;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%,-50%);
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="container">
        <svg id="svg"></svg>
        <div id="stations"></div>
    </div>

    <script>
        /* =======================================================
           CONFIG
           ======================================================= */
        const totalStations = 103;

        /*
          Mỗi phần tử là số item của 1 line
          👉 bạn đổi tùy ý, UI KHÔNG BAO GIỜ BROKEN
        */
        const rowPattern = [6, 6, 6, 6, 6, 6];

        const spacingX = 150;
        const spacingY = 120;
        const offsetX = 120;
        const offsetY = 80;
        const bend = 90;

        /* =======================================================
           PREPARE DATA
           ======================================================= */
        const svg = document.getElementById("svg");
        const stations = document.getElementById("stations");

        let rows = [];
        let counter = 1;

        while (counter <= totalStations) {
            for (const n of rowPattern) {
                let row = [];
                for (let i = 0; i < n && counter <= totalStations; i++) {
                    row.push(counter++);
                }
                rows.push(row);
                if (counter > totalStations) break;
            }
        }

        /* =======================================================
           SIZE SVG
           ======================================================= */
        const maxCols = Math.max(...rows.map(r => r.length));
        const width = offsetX * 2 + (maxCols - 1) * spacingX;
        const height = offsetY * 2 + (rows.length - 1) * spacingY;

        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        /* =======================================================
           HELPERS
           ======================================================= */
        function buildRowX(count) {
            return Array.from({ length: count }, (_, i) =>
                offsetX + i * spacingX
            );
        }

        /* =======================================================
           DRAW STATIONS + PATH
           ======================================================= */
        let d = "";
        let dir = 1;

        rows.forEach((row, rowIndex) => {
            const y = offsetY + rowIndex * spacingY;

            const xs = buildRowX(row.length);
            const useX = dir === 1 ? xs : [...xs].reverse();

            useX.forEach((x, i) => {
                const el = document.createElement("div");
                el.className = "station";
                el.style.left = x + "px";
                el.style.top = y + "px";
                el.textContent = "S" + row[i];
                stations.appendChild(el);

                if (d === "") d = `M ${x} ${y}`;
                else d += ` L ${x} ${y}`;
            });

            // connect to next row
            if (rowIndex < rows.length - 1) {
                const edgeX = useX[useX.length - 1];
                const nextY = y + spacingY;

                d += `
                  L ${edgeX + dir * bend} ${y}
                  L ${edgeX + dir * bend} ${nextY}
                  L ${edgeX} ${nextY}
                `;
            }

            dir *= -1;
        });

        /* =======================================================
           SVG PATH
           ======================================================= */
        const base = document.createElementNS("http://www.w3.org/2000/svg", "path");
        base.setAttribute("d", d);

        const flow = document.createElementNS("http://www.w3.org/2000/svg", "path");
        flow.setAttribute("d", d);
        flow.setAttribute("class", "flow");

        svg.appendChild(base);
        svg.appendChild(flow);

        /* =======================================================
           SCALE STATIONS TO SVG
           ======================================================= */
        function scaleStations() {
            const rect = svg.getBoundingClientRect();
            const scale = rect.width / width;
            stations.style.transform = `scale(${scale})`;
        }
        window.addEventListener("resize", scaleStations);
        scaleStations();
    </script>
</body>
</html>
