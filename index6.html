<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conveyor Smart UI</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0f172a;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
}

.container {
    width: 80%;
    position: relative;
}

svg {
    width: 100%;
    height: auto;
}

path {
    fill: none;
    stroke: #334155;
    stroke-width: 10;
    stroke-linejoin: round;
}

.flow {
    stroke: #38bdf8;
    stroke-width: 3;
    stroke-dasharray: 6 12;
    animation: flow 1.5s linear infinite;
}

@keyframes flow {
    to { stroke-dashoffset: -18; }
}

#stations {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top left;
}

.station {
    position: absolute;
    width: 120px;
    height: 42px;
    background: #3b82f6;
    border-radius: 10px;
    color: white;
    font-size: 12px;

    display: flex;
    align-items: center;
    justify-content: center;

    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="container">
    <svg id="svg"></svg>
    <div id="stations"></div>
</div>

<script>
// CONFIG
const totalStations = 53;
const perRow = 8;
const maxPerRow = 10;

const spacingX = 130;
const spacingY = 150;
const offset = 80;
const padding = 40;

const svg = document.getElementById("svg");
const stationWrap = document.getElementById("stations");

let d = "";
let startX = padding + offset;
let startY = padding;

let dir = 1;
let rows = Math.ceil(totalStations / perRow);

const width = (maxPerRow - 1) * spacingX + offset * 2 + padding * 2;
const height = rows * spacingY + padding * 2;

svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

let rowPositions = [];
let rowDirs = [];

for (let row = 0; row < rows; row++) {

    let y = startY + row * spacingY;

    let countInRow = Math.min(perRow, totalStations - row * perRow);

    const safeMargin = offset * 0.6;

    let minX = startX + safeMargin;
    let maxX = startX + (maxPerRow - 1) * spacingX - safeMargin;

    let step = countInRow > 1 ? (maxX - minX) / (countInRow - 1) : 0;

    const isLastRow = row === rows - 1;

    // 🔥 HƯỚNG ĐÚNG
    let useDir = isLastRow && rowDirs.length > 0
        ? rowDirs[rowDirs.length - 1]
        : dir;

    let currentRowX = [];

    for (let col = 0; col < countInRow; col++) {

        let index = row * perRow + col;

        let x;

        if (isLastRow && rowPositions.length > 0) {

            let prevRow = rowPositions[rowPositions.length - 1];

            let mappedIndex = useDir === 1
                ? col
                : (prevRow.length - 1 - col);

            x = prevRow[mappedIndex];

        } else {

            x = useDir === 1
                ? minX + col * step
                : maxX - col * step;
        }

        currentRowX.push(x);

        let el = document.createElement("div");
        el.className = "station";
        el.style.left = x + "px";
        el.style.top = y + "px";
        el.innerText = "S" + (index + 1);

        stationWrap.appendChild(el);

        if (index === 0) {
            d += `M ${x} ${y}`;
        } else {
            d += ` L ${x} ${y}`;
        }
    }

    rowPositions.push(currentRowX);
    rowDirs.push(dir);

    if (row < rows - 1) {

        let lastX = dir === 1 ? maxX : minX;
        let nextY = y + spacingY;

        if (dir === 1) {
            d += `L ${lastX + offset} ${y} L ${lastX + offset} ${nextY} L ${lastX} ${nextY}`;
        } else {
            d += `L ${lastX - offset} ${y} L ${lastX - offset} ${nextY} L ${lastX} ${nextY}`;
        }
    }

    dir *= -1;
}

// DRAW
const base = document.createElementNS("http://www.w3.org/2000/svg", "path");
base.setAttribute("d", d);

const flow = document.createElementNS("http://www.w3.org/2000/svg", "path");
flow.setAttribute("d", d);
flow.setAttribute("class", "flow");

svg.appendChild(base);
svg.appendChild(flow);

// SCALE
function scaleStations() {
    const svgRect = svg.getBoundingClientRect();
    let scale = svgRect.width / width;
    scale = Math.max(scale, 0.5);
    stationWrap.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", scaleStations);
scaleStations();

</script>

</body>
</html>
