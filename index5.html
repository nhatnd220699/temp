<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Conveyor Smart UI</title>

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                margin: 0;
                background: #0f172a;
                font-family: sans-serif;

                display: flex;
                justify-content: center;
                align-items: center;

                /* height: 100vh;	
                overflow: hidden; */
            }

            /* MAIN */
            .container {
                position: relative;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                width: 80%;
                border: 1px solid green;
                transform-origin: top left;
            }

            /* SVG */
            svg {
                /* position: absolute;
                top: 0;
                left: 0; */
                width: 100%;
                height: auto;
                display: block;
            }

            /* PATH */
            path {
                fill: none;
                stroke: #334155;
                stroke-width: 10;
                stroke-linejoin: round;
            }

            /* FLOW */
            .flow {
                stroke: #38bdf8;
                stroke-width: 3;
                stroke-dasharray: 6 12;
                animation: flow 1.5s linear infinite;
            }

            @keyframes flow {
                to {
                    stroke-dashoffset: -18;
                }
            }

            #stations {
                position: absolute;
                top: 0;
                left: 0;
            }

            /* STATION */
            .station {
                position: absolute;
                width: 100px;
                height: 42px;
                background: #3b82f6;
                border-radius: 10px;

                display: flex;
                align-items: center;
                justify-content: center;

                font-size: 12px;
                color: white;

                transform: translate(-50%, -50%); /* 👈 QUAN TRỌNG */
            }
        </style>
    </head>

    <body>
        <div class="container" id="container">
            <svg id="svg"></svg>
            <div id="stations"></div>
        </div>

        <script>
            // CONFIG
            const totalStations = 44;
            const perRow = 8;
            const spacingX = 150;
            const spacingY = 120;
            const offset = 50;
            const padding = 22;

            const container = document.getElementById("container");
            const svg = document.getElementById("svg");
            const stationWrap = document.getElementById("stations");

            // ===== BUILD GRID =====
            let stations = [];
            let d = "";

            let startX = offset + padding;
            let startY = padding + 25;

            let dir = 1;
            let rows = Math.ceil(totalStations / perRow);

            const width = (perRow - 1) * spacingX + offset * 2 + padding * 2;
            const height = rows * spacingY + padding * 2;

            svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

            for (let row = 0; row < rows; row++) {
                let y = startY + row * spacingY;

                for (let col = 0; col < perRow; col++) {
                    let index = row * perRow + col;
                    if (index >= totalStations) break;

                    let x = startX + (dir === 1 ? col : perRow - 1 - col) * spacingX;

                    // create station
                    let el = document.createElement("div");
                    el.className = "station";
                    el.style.left = x + "px";
                    el.style.top = y + "px";
                    el.innerText = "S" + (index + 1);

                    stationWrap.appendChild(el);

                    stations.push({ x, y });

                    if (index === 0) {
                        d += `M ${x} ${y}`;
                    } else {
                        d += ` L ${x} ${y}`;
                    }
                }

                // CONNECT TO NEXT ROW (VUÔNG GÓC)
                if (row < rows - 1) {
                    let last = stations[stations.length - 1];
                    let nextY = y + spacingY;

                    if (dir === 1) {
                        d += `
							L ${last.x + offset} ${y}
							L ${last.x + offset} ${nextY}
							L ${last.x} ${nextY}
						`;
                    } else {
                        d += `
							L ${last.x - offset} ${y}
							L ${last.x - offset} ${nextY}
							L ${last.x} ${nextY}
						`;
                    }
                }

                dir *= -1;
            }

            // ===== DRAW PATH =====
            const base = document.createElementNS("http://www.w3.org/2000/svg", "path");
            base.setAttribute("d", d);

            const flow = document.createElementNS("http://www.w3.org/2000/svg", "path");
            flow.setAttribute("d", d);
            flow.setAttribute("class", "flow");

            svg.appendChild(base);
            svg.appendChild(flow);

            function scaleStations() {
                const svgRect = svg.getBoundingClientRect();

                const scale = svgRect.width / width;

                stationWrap.style.transform = `scale(${scale})`;
                stationWrap.style.transformOrigin = "top left";
            }

            window.addEventListener("resize", scaleStations);
            scaleStations();
        </script>
    </body>
</html>
